services:
  - type: static
    name: bookstore-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist/bookstore-frontend # Ajusta según tu carpeta de salida de Angular
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
  - type: web
    name: bookstore-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    plan: free
    envVars:
      # Base de datos (Render la conecta automáticamente)
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres
      - key: DB_PASSWORD
        sync: false
      # Secretos — se configuran manualmente en Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      # Variables fijas
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: CORS_ALLOWED_ORIGINS
        value: https://tu-sitio.netlify.app  # cambia por tu URL de Netlify
      - key: UPLOAD_DIR
        value: uploads
      - key: SERVER_PORT
        value: 8084
      - key: PAYPAL_BASE_URL
        value: https://api-m.sandbox.paypal.com