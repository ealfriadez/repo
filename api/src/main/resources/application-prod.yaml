# Perfil de producción — sin logs innecesarios
spring:
  datasource:
    #url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=disable
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=require  #parametros necesarios para SUPABASE

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Swagger deshabilitado en producción
  springdoc:
    swagger-ui:
      enabled: false
    api-docs:
      enabled: false

logging:
  level:
    root: WARN
    com.example.bookstoreai: INFO
    org.springframework.boot.autoconfigure.jdbc: DEBUG
    com.zaxxer.hikari: DEBUG
